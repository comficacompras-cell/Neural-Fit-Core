<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#00d4ff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Neural Fit" />
    <title>Neural Fit</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icons/icon-192.svg" />
    <link rel="apple-touch-icon" href="./icons/icon-192.svg" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  </head>
  <body>
    <main class="container">
      <header class="brand-header">
        <p class="brand-kicker">Entrenamiento Integral</p>
        <h1>Neural Fit</h1>
      </header>

      <section class="card">
        <h2>Perfil Operativo</h2>
        <div class="measure-grid">
          <label class="upload-item"><span>Nombre</span><input id="profile-name" type="text" /></label>
          <label class="upload-item"><span>Edad</span><input id="profile-age" type="number" min="10" /></label>
          <label class="upload-item"><span>Peso (kg)</span><input id="profile-weight" type="number" min="30" step="0.1" /></label>
          <label class="upload-item"><span>Estatura (cm)</span><input id="profile-height" type="number" min="120" step="0.1" /></label>
        </div>
        <div class="action-row"><button id="btn-save-profile" class="action-btn">Guardar Perfil</button></div>
      </section>

      <section class="card status-card">
        <h2>Estado Biomecanico Actual</h2>
        <div class="status-grid">
          <div class="status-item"><span class="status-icon"></span><div><p class="status-label">Biotipo</p><p id="status-biotipo" class="status-value">Pendiente</p></div></div>
          <div class="status-item"><span class="status-icon"></span><div><p class="status-label">Femur</p><p id="status-femur" class="status-value">Pendiente</p></div></div>
        </div>
      </section>

      <section class="card">
        <h2>Pestaña de Rutinas</h2>
        <div id="routine-list" class="swap-box">Generando rutina...</div>
        <div class="action-row"><button id="btn-train" class="action-btn">Entrenar</button></div>
      </section>

      <section class="card training-active">
        <h2>Ya estoy entrenando</h2>
        <div class="camera-wrap">
          <video id="training-video" class="training-video" autoplay playsinline muted></video>
          <div id="rep-overlay" class="rep-overlay">Reps: 0</div>
        </div>
      </section>
    </main>

    <script type="module">
      import { getFullAnalysisResult, getUserProfile, saveUserProfile } from "./storage.js";
      import { calculateAngle, updateRepState } from "./rep-counter.js";

      const saved = getFullAnalysisResult();
      const bioProfile = saved?.bio || null;
      const profileSaved = getUserProfile();

      const statusBiotipo = document.getElementById("status-biotipo");
      const statusFemur = document.getElementById("status-femur");
      const routineList = document.getElementById("routine-list");
      const repOverlay = document.getElementById("rep-overlay");
      const videoEl = document.getElementById("training-video");
      const btnTrain = document.getElementById("btn-train");
      const btnSaveProfile = document.getElementById("btn-save-profile");

      const profileInputs = {
        name: document.getElementById("profile-name"),
        age: document.getElementById("profile-age"),
        weightKg: document.getElementById("profile-weight"),
        heightCm: document.getElementById("profile-height"),
      };

      if (profileSaved) {
        profileInputs.name.value = profileSaved.name || "";
        profileInputs.age.value = profileSaved.age || "";
        profileInputs.weightKg.value = profileSaved.weightKg || "";
        profileInputs.heightCm.value = profileSaved.heightCm || "";
      }

      btnSaveProfile.addEventListener("click", () => {
        saveUserProfile({
          name: profileInputs.name.value.trim(),
          age: Number(profileInputs.age.value),
          weightKg: Number(profileInputs.weightKg.value),
          heightCm: Number(profileInputs.heightCm.value),
        });
      });

      if (bioProfile) {
        statusBiotipo.textContent = bioProfile.biotipo;
        statusFemur.textContent = `${bioProfile.femurRatio} (${bioProfile.femurCategory})`;
      }

      function generateRoutine(profile) {
        if (!profile) return ["Sentadilla goblet", "Puente de gluteo", "Plancha frontal"];
        if (profile.isLongFemur) {
          return ["Sentadilla con pausa", "Peso muerto rumano", "Zancada larga controlada"];
        }
        if (profile.biotipo === "endomorph") {
          return ["Sentadilla tempo", "Step-up con control", "Remo inclinado"];
        }
        return ["Sentadilla libre", "Hip thrust", "Press militar"];
      }

      routineList.innerHTML = generateRoutine(bioProfile).map((r, i) => `${i + 1}. ${r}`).join("<br>");

      let repState = { reps: 0, stage: "up" };
      const repConfig = bioProfile?.isLongFemur
        ? { downKneeAngle: 95, upKneeAngle: 155, maxTorsoLean: 50 }
        : { downKneeAngle: 90, upKneeAngle: 160, maxTorsoLean: 35 };

      function getPoseMetrics(landmarks) {
        const shoulder = landmarks[12];
        const hip = landmarks[24];
        const knee = landmarks[26];
        const ankle = landmarks[28];

        const kneeAngle = calculateAngle(hip, knee, ankle);
        const torsoLean = Math.abs((Math.atan2(shoulder.x - hip.x, shoulder.y - hip.y) * 180) / Math.PI);
        return { kneeAngle, torsoLean };
      }

      let poseInstance = null;
      async function startTraining() {
        if (!window.Pose || !window.Camera) return;
        if (poseInstance) return;

        poseInstance = new window.Pose({
          locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`,
        });

        poseInstance.setOptions({
          modelComplexity: 1,
          smoothLandmarks: true,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5,
        });

        poseInstance.onResults((results) => {
          if (!results.poseLandmarks) return;
          const metrics = getPoseMetrics(results.poseLandmarks);
          repState = updateRepState(metrics, repState, repConfig);
          repOverlay.textContent = `Reps: ${repState.reps}`;
        });

        const camera = new window.Camera(videoEl, {
          onFrame: async () => {
            await poseInstance.send({ image: videoEl });
          },
          width: 960,
          height: 540,
        });
        camera.start();
      }

      btnTrain.addEventListener("click", startTraining);

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
