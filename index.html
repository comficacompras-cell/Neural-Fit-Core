<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neural Fit Core</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>Neural Fit Core</h1>
        <p class="muted">
          Componente UI: Sustitucion Recomendada del Dia basada en tu analisis biomecanico.
        </p>
        <div id="daily-swap" class="swap-box">Cargando recomendacion...</div>
        <p id="pantry-question" class="muted"></p>
        <div class="action-row">
          <button id="btn-have" class="action-btn">Si, lo tengo</button>
          <button id="btn-no-have" class="action-btn alt">No, dame otra opcion</button>
        </div>
        <div id="pantry-response" class="swap-box secondary"></div>
      </section>
    </main>

    <script type="module">
      import { getFullAnalysisResult } from "./storage.js";

      const swapContainer = document.getElementById("daily-swap");
      const questionContainer = document.getElementById("pantry-question");
      const responseContainer = document.getElementById("pantry-response");
      const btnHave = document.getElementById("btn-have");
      const btnNoHave = document.getElementById("btn-no-have");
      const saved = getFullAnalysisResult();
      const swap = saved?.nutrition?.economicalSwaps?.[0];

      const emergencyAlternatives = {
        "Suero de leche": "Queso blanco duro rallado (proteina lenta)",
        Yuca: "Ocumo o Cambur Verde (carbohidratos complejos locales)",
        "Harina de maiz": "Avena en hojuelas o Fororo",
      };

      function normalizeFoodName(foodName) {
        if (!foodName) return null;
        return foodName.split("+")[0].trim();
      }

      if (swap) {
        swapContainer.textContent = `Hoy cambia ${swap.replace} por ${swap.with} para optimizar tu biotipo.`;
        const recommendedFood = normalizeFoodName(swap.with);
        questionContainer.textContent = `¿Tienes ${recommendedFood} disponible hoy o entra en tu presupuesto?`;

        btnHave.addEventListener("click", () => {
          responseContainer.textContent = `Excelente. Mantén ${recommendedFood} en tu plan de hoy.`;
        });

        btnNoHave.addEventListener("click", () => {
          const alternative = emergencyAlternatives[recommendedFood];
          if (alternative) {
            responseContainer.textContent = `Alternativa inmediata: ${alternative}.`;
          } else {
            responseContainer.textContent =
              "Hoy no hay una alternativa local cargada para ese alimento. Usa Fororo o Huevo como respaldo economico.";
          }
        });
      } else {
        swapContainer.textContent =
          "Completa tu analisis biomecanico para ver tu sustitucion recomendada del dia.";
        questionContainer.textContent = "";
        btnHave.disabled = true;
        btnNoHave.disabled = true;
        responseContainer.textContent = "";
      }
    </script>
  </body>
</html>
