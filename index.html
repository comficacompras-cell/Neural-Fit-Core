<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neural Fit Core</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>Neural Fit Core</h1>
        <p class="muted">
          Componente UI: Sustitucion Recomendada del Dia basada en tu analisis biomecanico.
        </p>
        <div id="daily-swap" class="swap-box">Cargando recomendacion...</div>
      </section>
    </main>

    <script type="module">
      import { getFullAnalysisResult } from "./storage.js";

      const swapContainer = document.getElementById("daily-swap");
      const saved = getFullAnalysisResult();
      const swap = saved?.nutrition?.economicalSwaps?.[0];

      if (swap) {
        swapContainer.textContent = `Hoy cambia ${swap.replace} por ${swap.with} para optimizar tu biotipo.`;
      } else {
        swapContainer.textContent =
          "Completa tu analisis biomecanico para ver tu sustitucion recomendada del dia.";
      }
    </script>
  </body>
</html>
